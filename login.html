<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Xerox Admin Login</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0f172a;
            margin: 0;
            padding: 20px;
        }

        .login-box {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-logo {
            width: 72px;
            height: 72px;
            margin: 0 auto 16px;
            background: #1e293b;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.2);
            border: 3px solid #3b82f6;
            overflow: hidden;
            flex-shrink: 0;
        }

        .login-logo img {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            border-radius: 0 !important;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #f8fafc;
        }

        .login-sub {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 32px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #f8fafc;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            margin-bottom: 16px;
        }

        .error-msg {
            color: var(--danger);
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }

        .forgot-link {
            font-size: 13px;
            color: #60a5fa;
            cursor: pointer;
            transition: color 0.2s;
            display: inline-block;
            margin-bottom: 10px;
        }

        .forgot-link:hover {
            color: #93bbfc;
            text-decoration: underline;
        }

        .success-msg {
            color: #22c55e;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }

        .reset-section {
            display: none;
        }

        .reset-section.active {
            display: block;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <div class="login-logo"><img src="img/logo.png" alt="Star Xerox"
                style="width:64px;height:64px;border-radius:12px;object-fit:cover"></div>
        <div class="login-title">Star Xerox</div>
        <div class="login-sub" id="loginSubtitle">Sign in to Admin Dashboard</div>

        <!-- LOGIN FORM -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label">Secure Admin Email</label>
                <input type="text" id="username" class="form-control" type="email" placeholder="admin@printmaster.com"
                    required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary btn-login">Sign In</button>
            <div class="error-msg" id="errorMsg">Invalid credentials.</div>

            <div>
                <span class="forgot-link" onclick="showResetForm()">Forgot Password?</span>
            </div>

            <div style="margin-top: 12px; font-size: 13px; color: var(--muted);">
                <a href="customer.html" style="color: var(--accent); text-decoration: none;">← Back to Website</a>
            </div>
        </form>

        <!-- RESET PASSWORD FORM -->
        <div class="reset-section" id="resetSection">
            <form id="resetForm" onsubmit="handleReset(event)">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="resetEmail" class="form-control" placeholder="your@email.com" required>
                </div>
                <button type="submit" class="btn btn-primary btn-login" id="resetBtn">📧 Send Reset Link</button>
                <div class="error-msg" id="resetError"></div>
                <div class="success-msg" id="resetSuccess">✅ Password reset link sent! Check your email inbox.</div>
                <div style="margin-top: 12px;">
                    <span class="forgot-link" onclick="showLoginForm()">← Back to Login</span>
                </div>
            </form>
        </div>
    </div>

    <!-- High Security Supabase Integration -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        async function checkSession() {
            if (!window.supabaseClient) return;
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            if (session) {
                window.location.href = 'index.html';
            }
        }
        checkSession();

        async function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            const btn = document.querySelector('#loginForm .btn-login');
            btn.textContent = 'Authenticating securely...';
            btn.disabled = true;

            const { data, error } = await window.supabaseClient.auth.signInWithPassword({
                email: u,
                password: p
            });

            if (error) {
                const err = document.getElementById('errorMsg');
                err.textContent = error.message || 'Invalid credentials.';
                err.style.display = 'block';
                setTimeout(() => err.style.display = 'none', 3000);
                btn.textContent = 'Sign In';
                btn.disabled = false;
            } else {
                window.location.href = 'index.html';
            }
        }

        // ── Password Reset ──
        function showResetForm() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('resetSection').classList.add('active');
            document.getElementById('loginSubtitle').textContent = 'Reset your password';
            document.getElementById('resetSuccess').style.display = 'none';
            document.getElementById('resetError').style.display = 'none';
        }

        function showLoginForm() {
            document.getElementById('loginForm').style.display = '';
            document.getElementById('resetSection').classList.remove('active');
            document.getElementById('loginSubtitle').textContent = 'Sign in to Admin Dashboard';
        }

        async function handleReset(e) {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value.trim();
            if (!email) return;

            const btn = document.getElementById('resetBtn');
            btn.textContent = 'Sending...';
            btn.disabled = true;

            const { error } = await window.supabaseClient.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/login.html'
            });

            if (error) {
                const errEl = document.getElementById('resetError');
                errEl.textContent = error.message || 'Failed to send reset email.';
                errEl.style.display = 'block';
                setTimeout(() => errEl.style.display = 'none', 4000);
            } else {
                document.getElementById('resetSuccess').style.display = 'block';
                document.getElementById('resetError').style.display = 'none';
            }

            btn.textContent = '📧 Send Reset Link';
            btn.disabled = false;
        }
    </script>
</body>

</html>
